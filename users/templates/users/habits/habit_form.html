{% extends 'users/base.html' %}


{% block content %}
<style>
    /* Sahifa foni */
    body {
        background-color: #fff5f7 !important;
        font-family: 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .form-container {
        width: 100%;
        max-width: 400px;
        background: white;
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(255, 117, 140, 0.05);
        border: 1px solid #ffeef2;
        text-align: center;
    }

    h2 {
        color: #444;
        font-weight: 700;
        margin-bottom: 25px;
        font-size: 1.8rem;
    }

    input[type="text"] {
        width: 100%;
        padding: 15px;
        border-radius: 15px;
        border: 2px solid #f0f2f5;
        background: #fcfcfc;
        font-size: 1rem;
        transition: 0.3s;
        box-sizing: border-box; /* Padding bilan kenglikni to'g'rilaydi */
        margin-bottom: 20px;
    }

    input[type="text"]:focus {
        outline: none;
        border-color: #74c0fc;
        background: white;
        box-shadow: 0 5px 15px rgba(116, 192, 252, 0.1);
    }

    .btn-submit {
        background: #74c0fc;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 15px;
        width: 100%;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(116, 192, 252, 0.2);
    }

    .btn-submit:hover {
        transform: translateY(-3px);
        filter: brightness(1.05);
    }

    .cancel-link {
        display: block;
        margin-top: 20px;
        color: #ff8787;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
    }

    .cancel-link:hover {
        text-decoration: underline;
    }
</style>

<div class="form-container">
    <h2>{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" value="{{ habit.name }}" placeholder="Typing habits name..." required>

        <button type="submit" class="btn-submit">Save ✨</button>
        <!-- To'g'ri qator -->
        <a href="{% url 'my_habits' %}" class="cancel-link">Cancel</a>
    </form>
</div>
{% endblock %}
