<!DOCTYPE html>
<html>
<head>
    <title>Edit Habit</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffffcc;
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #45a049;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .back:hover {
            color: black;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>✏️ Edit Habit</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" value="{{ habit.name }}" required>

            <button class="btn" type="submit">Update Habit</button>
        </form>

        <a class="back" href="{% url 'my_habits' %}">⬅ Back to Dashboard</a>

    </div>
</div>

</body>
</html>
