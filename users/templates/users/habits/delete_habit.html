<!DOCTYPE html>
<html>
<head>
    <title>Delete Habit</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffffcc;
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #d9534f;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .delete-btn {
            background: #d9534f;
            color: white;
        }

        .delete-btn:hover {
            background: #c9302c;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        .cancel-btn:hover {
            background: #5a6268;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>⚠️ Delete Habit</h2>

        <p>
            Are you sure you want to delete
            <b>"{{ habit.name }}"</b>?
        </p>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn delete-btn">
                Yes, Delete
            </button>

            <a href="{% url 'my_habits' %}" class="btn cancel-btn">
                Cancel
            </a>
        </form>

    </div>
</div>

</body>
</html>
